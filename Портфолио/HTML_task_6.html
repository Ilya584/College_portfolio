<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Killer Queen</title>
    <link rel="stylesheet" href="CSS/style6.css">
</head>
<body>
    <header>
        <div class="main_title">
            <div class="img_box">
            <img src="img/d5bd41d3d932a2439c712b701f1df178.ico" alt="Лого" class="logo">
            </div>
            <h2>Форма отзывов</h2>
        </div>
    </header>
    <div class="data">
        <form>
           
            <!-- <fieldset class="m_title"> -->
            <!-- <legend>Личные данные</legend> -->
             <p class="m_title">Личные данные</p>
            <label>ID отзыва</label>
            <input type="text" placeholder="12345">
            <label>Имя путишествинника</label>
            <input type="text" placeholder="Джони Джостар">
       <!-- </fieldset> -->
    </div>
    <div class="data">
       
       
         <p class="m_title">Оценка отеля</p>
        
        <label>Наименование отеля</label>
        <input type="text" placeholder="Введите название">
        <label>Дата въезда</label>
        <input type="date">
        <br>
        <label>Цвет кровати</label>
        <input type="color">
        <label class="t">Оценка обедов</label>
        <select>
    <option selected>Volvo</option>
    <option>Saab</option>
    <option>Fiat</option>
    </select>
<br>
    <p>Самая вкусная рыба</p>
  
<select id="fish" multiple size="4">
  <option>Норвежский лось</option>
  <option>Рыба еж</option>
  <option>Карась</option>
  <option>Карп</option>
</select>

</div>

<div class="data">

<p class="m_title">Отзыв о поздке</p>
<label>Страна визита</label>
<input type="text" placeholder="Норвегия">
<label>Город</label>
    <select>
        <option selected>Осло</option>
        <option>Saab</option>
        <option>Fiat</option>
        </select>
        <br>
        <p>Оценка поездки</p>
        <p class="ran">0</p>
        <input type="range">
        <p class="ran">10</p>
        <br>
        <label>Текст отзыва:</label>
        <br>
        <textarea placeholder="О май гад, уау!!!"></textarea>
        
        </div>
        <div class="m_bt">
        <button class="bt">Оценить</button>
        <button class="bt" type="reset">Сбросить</button>
        </div>
    </div>
</form>


</body>
</html>
